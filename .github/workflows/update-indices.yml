name: Actualizar indices (SPY/QQQ)
on:
  schedule:
    - cron: "30 22 * * 1-5"   # dias habiles, ~19:30 ET (despues del cierre de EE.UU.)
  workflow_dispatch:           # permite correrlo a mano
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generar data/indices.json
        run: python update_indices.py
      - name: Commit si cambio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indices.json
          git diff --staged --quiet || git commit -m "indices $(date -u +%F)"
          git push
